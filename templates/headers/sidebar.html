{% load static %}
  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <!-- Brand Logo -->
    <a href="index3.html" class="brand-link">
      <img src="{% static 'js/dist/img/AdminLTELogo.png' %}" alt="AdminLTE Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light">HR- Portal</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user panel (optional) -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="{{ request.user.employee.emp_image.url }}" class="img-circle elevation-2" alt="User Image">
        </div>
        <div class="info">
          <a href="#" class="d-block"> {{ request.user.employee.emp_name }}</a>
        </div>
      </div>
      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <!-- Add icons to the links using the .nav-icon class
               with font-awesome or any other icon font library -->
          <li class="nav-item menu-open">
            {% if request.user.groups.all.0.name == 'HR' %}
                <a href="{% url 'hr.dashboard' %}" class="nav-link active">
            {% else %}
                <a href="{% url 'employee.dashboard' %}" class="nav-link active">
            {% endif %}
              <i class="nav-icon fas fa-tachometer-alt"></i>
              <p>
                Dashboard
                <i class="right fas fa-angle-left"></i>
              </p>
            </a>
          </li>
         <li class="nav-item">
            <a href="{% url 'hr.employee_list' %}" class="nav-link">
              <i class="nav-icon far fa-image"></i>
              <p>
                Employee {{ request.user.employee.group }}
              </p>
            </a>
          </li> 
          <li class="nav-item">
                <a href="{% url 'hr.employee_attendance' %}" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>Attendance</p>
                </a>
          </li>  
          <li class="nav-item">
                <a href="{% url 'hr.leaves' %}" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>Leaves</p>
                </a>
          </li>      
          <li class="nav-item">
            <a href="{% url 'hr.holyDayList' %}" class="nav-link">
              <i class="nav-icon far fa-image"></i>
              <p>
                Holiday List
              </p>
            </a>
          </li>
          <li class="nav-item">
            <a href="{% url 'hr.my_profile' request.user.employee.id %}" class="nav-link">
              <i class="nav-icon far fa-image"></i>
              <p>
                My Profile
              </p>
            </a>
          </li>
        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
  </aside>
